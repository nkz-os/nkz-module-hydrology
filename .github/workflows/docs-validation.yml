name: Docs Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  validate-docs:
    name: Validate Docs-as-Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Frontmatter Validator
        run: node scripts/docs-validator.js
