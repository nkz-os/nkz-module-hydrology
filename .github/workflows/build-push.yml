# =============================================================================
# NKZ Water Studio - GitHub Actions CI/CD
# =============================================================================
# On push to main or a version tag:
#   1. Type-check frontend + run backend tests
#   2. Build the IIFE bundle (dist/nkz-module.js) — uploaded as artifact
#   3. Build and push the backend Docker image to GHCR (if module has a backend)
#
# After customizing for your module, add MinIO deploy + activation steps
# for immutable versioned deploys (see nkz-module-vpn for reference).
# =============================================================================

name: Build and Push

on:
    push:
        branches:
            - main
        tags:
            - "v*"
    pull_request:
        branches:
            - main

env:
    REGISTRY: ghcr.io
    BACKEND_IMAGE: ghcr.io/${{ github.repository }}/hydrology-backend

jobs:
    # ==========================================================================
    # Test
    # ==========================================================================
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check
              run: pnpm run typecheck

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"
                  cache-dependency-path: backend/requirements.txt

            - name: Install backend dependencies
              run: pip install -r backend/requirements.txt

            - name: Run backend tests
              run: cd backend && python -m pytest tests/ -v

    # ==========================================================================
    # Build IIFE bundle
    # ==========================================================================
    build-module:
        name: Build IIFE Bundle
        runs-on: ubuntu-latest
        needs: test
        # Enabled after placeholder replacement
        if: false  # CHANGE TO true ONCE FRONTEND IS FULLY IMPLEMENTED
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build module bundle
              run: pnpm run build:module
              env:
                NKZ_VERSION_HASH: ${{ github.sha }}

            - name: Upload bundle artifact
              uses: actions/upload-artifact@v4
              with:
                  name: nkz-module
                  path: dist/nkz-module.js
                  retention-days: 30

    # ==========================================================================
    # Build and push backend Docker image
    # ==========================================================================
    build-backend:
        name: Build Backend Image
        runs-on: ubuntu-latest
        needs: test
        # Enabled after placeholder replacement
        if: ${{ github.event_name != 'pull_request' }}
        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for Backend
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.BACKEND_IMAGE }}
                  tags: |
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix=

            - name: Build and push Backend image
              uses: docker/build-push-action@v5
              with:
                  context: backend
                  file: backend/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

    # ==========================================================================
    # Publish MF2 remote (main only) via canonical OIDC workflow
    # ==========================================================================
    publish-module:
        name: Publish Module
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        permissions:
            id-token: write
            contents: read
        uses: nkz-os/nkz/.github/workflows/_publish-module.yml@main
        with:
            module_id: "hydrology"
        secrets:
            INTERNAL_SERVICE_SECRET: ${{ secrets.INTERNAL_SERVICE_SECRET }}
