apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydrology-worker
  namespace: nekazari
  labels:
    app: hydrology-worker
    component: worker
    module: hydrology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hydrology-worker
  template:
    metadata:
      labels:
        app: hydrology-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/nkz-os/nkz-module-hydrology/hydrology-backend:19bc884
          imagePullPolicy: IfNotPresent
          command: ["rq", "worker", "hydrology-processing", "--url", "$(REDIS_URL)"]
          envFrom:
            - configMapRef:
                name: hydrology-config
                optional: true
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
            - name: ORION_LD_URL
              value: "http://orion-ld-service:1026"
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-service-secret
                  key: INTERNAL_SERVICE_SECRET
            - name: HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
